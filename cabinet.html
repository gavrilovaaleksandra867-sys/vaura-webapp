<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vaura VPN — Личный кабинет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #2d2b3e 0%, #1a1a2a 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            color: #f0e6d8;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 30px;
        }

        /* ========== ШАПКА ========== */
        .header {
            margin-bottom: 24px;
        }

        .domain {
            font-size: 12px;
            color: #b8a9c9;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .brand {
            font-size: 28px;
            font-weight: 700;
            color: #ffb7b2;
            letter-spacing: 1px;
        }

        .brand small {
            font-size: 12px;
            font-weight: 400;
            color: #b8a9c9;
            letter-spacing: 0;
        }

        /* ========== КАРТОЧКА БАЛАНСА ========== */
        .balance-card {
            background: rgba(255, 245, 235, 0.08);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 183, 178, 0.25);
            text-align: center;
        }

        .balance-label {
            font-size: 13px;
            color: #b8a9c9;
            margin-bottom: 6px;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 800;
            color: #ffb7b2;
            line-height: 1;
        }

        .balance-days {
            font-size: 13px;
            color: #c9bc9f;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed rgba(255, 183, 178, 0.2);
        }

        /* ========== ПРЕДУПРЕЖДЕНИЕ ========== */
        .warning-message {
            background: rgba(244, 67, 54, 0.12);
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .warning-text {
            color: #ff8a7a;
            font-size: 14px;
            font-weight: 500;
        }

        .warning-sub {
            font-size: 12px;
            color: #b8a9c9;
            margin-top: 6px;
        }

        /* ========== КНОПКИ ========== */
        .btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #ffb7b2;
            color: #2d2b3e;
        }

        .btn-primary:active {
            transform: scale(0.98);
            background: #ffa69e;
        }

        .btn-secondary {
            background: rgba(255, 245, 235, 0.08);
            color: #f0e6d8;
            border: 1px solid rgba(255, 183, 178, 0.3);
        }

        .btn-secondary:active {
            background: rgba(255, 245, 235, 0.15);
        }

        /* ========== БЛОК УСТРОЙСТВА ========== */
        .device-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 18px;
            margin-top: 20px;
            border: 1px solid rgba(255, 183, 178, 0.2);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .device-name {
            font-weight: 600;
            font-size: 15px;
            color: #ffb7b2;
        }

        .device-date {
            font-size: 11px;
            color: #b8a9c9;
        }

        .device-status {
            font-size: 12px;
            color: #8bc34a;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 183, 178, 0.15);
        }

        .key-link {
            font-family: monospace;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 16px;
            word-break: break-all;
            margin: 12px 0;
            color: #c9bc9f;
        }

        .copy-btn {
            background: rgba(255, 183, 178, 0.15);
            border: 1px solid rgba(255, 183, 178, 0.4);
            padding: 10px;
            border-radius: 24px;
            color: #ffb7b2;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .replace-btn {
            background: rgba(255, 183, 178, 0.08);
            border: 1px solid rgba(255, 183, 178, 0.3);
            padding: 10px;
            border-radius: 24px;
            color: #ffb7b2;
            width: 100%;
            font-size: 14px;
            cursor: pointer;
        }

        /* ========== ТАРИФ ========== */
        .tariff-footer {
            text-align: center;
            font-size: 12px;
            color: #b8a9c9;
            margin-top: 24px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
        }

        .tariff-footer span {
            color: #ffb7b2;
            font-weight: 600;
        }

        /* ========== МЕНЮ ВЫБОРА СУММЫ ========== */
        .back-btn {
            background: none;
            border: none;
            color: #b8a9c9;
            font-size: 14px;
            margin-bottom: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sum-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .sum-btn {
            background: rgba(255, 245, 235, 0.08);
            border: 1px solid rgba(255, 183, 178, 0.3);
            padding: 12px;
            border-radius: 24px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            color: #f0e6d8;
            cursor: pointer;
        }

        .sum-btn:active {
            background: rgba(255, 183, 178, 0.2);
        }

        .payment-note {
            font-size: 11px;
            color: #b8a9c9;
            text-align: center;
            margin-top: 16px;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #b8a9c9;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loader">Загрузка 🌸</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.text = "Закрыть";
        tg.MainButton.onClick(() => tg.close());

        let userId = null;
        let userData = {
            balance: 0,
            days: 0,
            hasActiveKey: false,
            vpnKey: null,
            deviceName: "Моё устройство",
            expiryDate: null,
            active: false
        };

        function initUser() {
            const initData = tg.initDataUnsafe;
            if (initData && initData.user) {
                userId = initData.user.id;
            } else {
                userId = 123456789;
            }
            loadUserData();
        }

        async function loadUserData() {
            try {
                // TODO: заменить на реальный API
                const response = await fetch(`https://твой-сервер.ru/api/user?tg_id=${userId}`);
                const data = await response.json();
                userData = {
                    balance: data.balance || 0,
                    days: Math.floor((data.balance || 0) / 4),
                    hasActiveKey: !!(data.vpn_key && data.active),
                    vpnKey: data.vpn_key,
                    deviceName: data.device_name || "Моё устройство",
                    expiryDate: data.expiry_date,
                    active: data.active
                };
                renderMain();
            } catch (e) {
                // Демо-режим
                userData = {
                    balance: 0,
                    days: 0,
                    hasActiveKey: false,
                    vpnKey: null,
                    deviceName: "Моё устройство",
                    expiryDate: null,
                    active: false
                };
                renderMain();
            }
        }

        function sendAction(action, data = {}) {
            tg.sendData(JSON.stringify({ action, ...data }));
            tg.close();
        }

        function deposit(amount) {
            sendAction('deposit', { amount });
        }

        function activateVPN() {
            sendAction('activate');
        }

        function replaceKey() {
            sendAction('renew_key');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            tg.showPopup({
                title: 'Скопировано',
                message: 'Ссылка скопирована в буфер обмена',
                buttons: [{type: 'ok'}]
            });
        }

        // ========== ГЛАВНЫЙ ЭКРАН ==========
        function renderMain() {
            const app = document.getElementById('app');
            const hasMoney = userData.balance >= 4;
            const hasActive = userData.hasActiveKey && userData.active;
            
            app.innerHTML = `
                <div class="header">
                    <div class="domain">vaura-vpn.ru</div>
                    <div class="brand">Vaura VPN<br><small>японская эстетика</small></div>
                </div>

                <div class="balance-card">
                    <div class="balance-label">Баланс</div>
                    <div class="balance-amount">${userData.balance} ₽</div>
                    <div class="balance-days">🌸 Хватит на <strong>${userData.days}</strong> дней</div>
                </div>

                ${!hasMoney && !hasActive ? `
                    <div class="warning-message">
                        <div class="warning-text">⚠️ Недостаточно средств</div>
                        <div class="warning-sub">Для продолжения работы пополните баланс</div>
                    </div>
                ` : ''}

                <button class="btn btn-primary" id="depositBtn">+ Пополнить</button>
                <button class="btn btn-secondary" id="historyBtn">📜 История</button>

                ${hasMoney && !hasActive ? `
                    <button class="btn btn-primary" id="activateBtn">🔑 Активировать VPN</button>
                ` : ''}

                ${hasActive ? `
                    <div class="device-card">
                        <div class="device-header">
                            <span class="device-name">📱 ${userData.deviceName}</span>
                            <span class="device-date">${userData.expiryDate || 'активен'}</span>
                        </div>
                        <div class="device-status">✅ Подключено: 1 устройство</div>
                        
                        <div class="key-link">
                            ${userData.vpnKey ? userData.vpnKey.substring(0, 55) + '...' : 'нет ключа'}
                        </div>
                        
                        <button class="copy-btn" id="copyLinkBtn">📋 Скопировать ссылку</button>
                        <button class="replace-btn" id="replaceBtn">🔄 Заменить настройки устройства</button>
                    </div>
                ` : ''}

                <div class="tariff-footer">
                    🌸 <span>4 ₽/день</span> · безлимит · без логов · 1 устройство
                </div>
            `;

            document.getElementById('depositBtn')?.addEventListener('click', () => showDepositMenu());
            document.getElementById('historyBtn')?.addEventListener('click', () => showHistory());
            document.getElementById('activateBtn')?.addEventListener('click', () => activateVPN());
            document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
                if (userData.vpnKey) copyToClipboard(userData.vpnKey);
            });
            document.getElementById('replaceBtn')?.addEventListener('click', () => showReplaceMenu());
        }

        // ========== МЕНЮ ПОПОЛНЕНИЯ ==========
        function showDepositMenu() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <button class="back-btn" id="backBtn">← Назад</button>
                
                <div class="balance-card" style="margin-top: 0;">
                    <div class="balance-label">Баланс</div>
                    <div class="balance-amount">${userData.balance} ₽</div>
                </div>

                <div style="margin-top: 16px;">
                    <div style="font-weight: 500; margin-bottom: 12px;">🌸 Выберите сумму</div>
                    <div class="sum-grid">
                        ${[100, 200, 300, 400, 500, 700, 800, 900, 1000].map(amount => `
                            <div class="sum-btn" data-amount="${amount}">${amount} ₽</div>
                        `).join('')}
                    </div>
                </div>

                <div class="payment-note">
                    🌸 Пополнение баланса — разовая операция.<br>
                    Средства зачисляются автоматически.
                </div>
            `;

            document.getElementById('backBtn')?.addEventListener('click', () => renderMain());
            document.querySelectorAll('.sum-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const amount = parseInt(e.target.getAttribute('data-amount'));
                    deposit(amount);
                });
            });
        }

        // ========== МЕНЮ ЗАМЕНЫ ==========
        function showReplaceMenu() {
            if (!userData.hasActiveKey || !userData.vpnKey) {
                tg.showPopup({
                    title: 'Нет активного ключа',
                    message: 'Сначала активируйте VPN',
                    buttons: [{type: 'ok'}]
                });
                return;
            }

            const app = document.getElementById('app');
            app.innerHTML = `
                <button class="back-btn" id="backBtn">← Назад</button>
                
                <div class="device-card" style="margin-top: 0;">
                    <div class="device-header">
                        <span class="device-name">📱 ${userData.deviceName}</span>
                    </div>
                    
                    <div class="warning-text" style="font-size: 13px; margin-bottom: 12px;">
                        🔧 Перестал работать VPN?<br>
                        Нажмите «Заменить» — получите новый ключ
                    </div>
                    
                    <button class="replace-btn" id="confirmReplaceBtn" style="background: #ffb7b2; color: #2d2b3e; margin-bottom: 16px;">
                        🔄 Заменить настройки
                    </button>
                    
                    <div style="margin-top: 8px;">
                        <div style="font-size: 12px; color: #b8a9c9; margin-bottom: 8px;">📋 Ссылка для настройки</div>
                        <div class="key-link" style="font-size: 10px;">${userData.vpnKey}</div>
                        <button class="copy-btn" id="copyReplaceBtn" style="margin-top: 10px;">📋 Скопировать ссылку</button>
                    </div>
                </div>
            `;

            document.getElementById('backBtn')?.addEventListener('click', () => renderMain());
            document.getElementById('confirmReplaceBtn')?.addEventListener('click', () => replaceKey());
            document.getElementById('copyReplaceBtn')?.addEventListener('click', () => {
                if (userData.vpnKey) copyToClipboard(userData.vpnKey);
            });
        }

        function showHistory() {
            tg.showPopup({
                title: 'История',
                message: 'Скоро здесь появятся ваши платежи',
                buttons: [{type: 'ok'}]
            });
        }

        initUser();
    </script>
</body>
</html>
